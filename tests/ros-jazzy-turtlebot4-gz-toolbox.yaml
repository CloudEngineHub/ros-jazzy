tests:
  # Regression test for https://github.com/RoboStack/ros-jazzy/pull/246
  - script:
    - python -c "import os,sys; from pathlib import Path; p=Path(os.environ.get('LIBRARY_PREFIX') or os.environ['PREFIX']); roots=[p,p/'Library']; libnames=['libturtlebot4_gz_toolbox_lib.so','libturtlebot4_gz_toolbox_lib.dylib','turtlebot4_gz_toolbox_lib.dll']; shared=[r/d/f for r in roots for d in ('lib','bin') for f in libnames]; static=[p/'lib/libturtlebot4_gz_toolbox_lib.a', p/'Library/lib/turtlebot4_gz_toolbox_lib.lib']; assert any(x.exists() for x in shared), 'missing shared turtlebot4_gz_toolbox_lib'; assert sys.platform.startswith('win') or not any(x.exists() for x in static), 'static turtlebot4_gz_toolbox_lib was installed'"
