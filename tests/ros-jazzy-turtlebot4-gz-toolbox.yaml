tests:
  # Regression test for https://github.com/RoboStack/ros-jazzy/pull/246
  - script:
    - python -c "import os,platform,subprocess,sys; from pathlib import Path; p=Path(os.environ.get('LIBRARY_PREFIX') or os.environ['PREFIX']); exe=p/'lib/turtlebot4_gz_toolbox/turtlebot4_gz_hmi_node'; win_exe=p/'lib/turtlebot4_gz_toolbox/turtlebot4_gz_hmi_node.exe'; dll=p/'lib/turtlebot4_gz_toolbox/turtlebot4_gz_toolbox_lib.dll'; so=p/'lib/turtlebot4_gz_toolbox/libturtlebot4_gz_toolbox_lib.so'; dylib=p/'lib/turtlebot4_gz_toolbox/libturtlebot4_gz_toolbox_lib.dylib'; static=[p/'lib/libturtlebot4_gz_toolbox_lib.a', p/'Library/lib/turtlebot4_gz_toolbox_lib.lib']; assert sys.platform.startswith('win') or not any(x.exists() for x in static), 'static turtlebot4_gz_toolbox_lib was installed'; system=platform.system(); assert any(x.exists() for x in (so,dylib,dll)), 'missing shared turtlebot4_gz_toolbox_lib next to executable'; assert exe.exists() or win_exe.exists(), 'missing turtlebot4_gz_hmi_node executable'; out = subprocess.check_output(['ldd', str(exe)], text=True) if system == 'Linux' else subprocess.check_output(['otool', '-L', str(exe)], text=True) if system == 'Darwin' else ''; assert 'not found' not in out, out; assert str(so) in out if system == 'Linux' else 'libturtlebot4_gz_toolbox_lib' in out if system == 'Darwin' else dll.exists(), 'loader does not resolve turtlebot4_gz_toolbox_lib from lib/turtlebot4_gz_toolbox'; result = subprocess.run([str(win_exe), '--ros-args', '--help'], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, timeout=10) if system == 'Windows' else None; assert system != 'Windows' or result.returncode != 3221225781, result.stderr"
