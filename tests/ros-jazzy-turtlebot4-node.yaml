tests:
  # Regression test for https://github.com/RoboStack/ros-jazzy/pull/246
  - script:
    - python -c "import os,subprocess,sys,time; from pathlib import Path; p=Path(os.environ.get('LIBRARY_PREFIX') or os.environ['PREFIX']); exe=p/'lib/turtlebot4_node'/('turtlebot4_node.exe' if sys.platform.startswith('win') else 'turtlebot4_node'); assert exe.exists(), f'missing {exe}'; assert sys.platform.startswith('win') or not (p/'lib/libturtlebot4_node_lib.a').exists(), 'static turtlebot4_node_lib was installed'; q=subprocess.Popen([str(exe), '--ros-args', '--help']); time.sleep(3); rc=q.poll(); (q.terminate(), q.wait(), sys.exit(0)) if rc is None else sys.exit(rc)"
